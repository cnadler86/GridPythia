<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GridPythia</title>
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    crossorigin="anonymous">
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js" charset="utf-8"></script>
  <style>
    body { font-size: .875rem; background: #f8f9fa; }
    .gp-chart { min-height: 300px; }
    .tab-pane { display: none; }
    .tab-pane.show.active { display: block; }
    .nav-link { cursor: pointer; padding: .35rem .75rem; }
    #status-msg { min-width: 180px; font-size: .8rem; }
    .spinner-border { width: 1rem; height: 1rem; border-width: .15em; }
    #tabContent {
      background: #fff;
      border: 1px solid #dee2e6;
      border-top: none;
      border-radius: 0 0 .375rem .375rem;
      padding: .75rem;
    }

    @media (max-width: 768px) {
      #battery-controls { width: 100%; margin-top: 0.5rem; order: 3; }
      #mainTabs { flex-wrap: nowrap; overflow-x: auto; }
      .nav-tabs .nav-link { white-space: nowrap; padding: .25rem .5rem; font-size: .75rem; }
      #tabContent { padding: .5rem; }
      .gp-chart { min-height: 250px; }
    }
    @media (max-width: 576px) {
      body { font-size: .75rem; }
      .navbar { padding: 0.5rem; }
      #mainTabs { border-bottom: 1px solid #dee2e6; overflow-x: auto; scrollbar-width: thin; }
      #mainTabs::-webkit-scrollbar { height: 4px; }
      #mainTabs::-webkit-scrollbar-thumb { background: #888; border-radius: 2px; }
      .nav-tabs .nav-link { padding: .2rem .4rem; font-size: .65rem; }
      #tabContent { padding: .25rem; }
      .gp-chart { min-height: 200px; }
    }
  </style>
</head>
<body>

<!-- ── Navbar ──────────────────────────────────────────────────────── -->
<nav class="navbar navbar-dark bg-dark py-2 px-3">
  <div class="container-fluid">
    <span class="navbar-brand fw-bold">⚡ GridPythia</span>
    <div class="d-flex align-items-center gap-2 ms-auto">
      <span id="status-msg" class="text-white-50 text-truncate"
        style="max-width:200px; font-size:.8rem;"></span>
      <div id="spinner" class="spinner-border text-light d-none" role="status"
        style="width:1rem; height:1rem; border-width:.15em">
        <span class="visually-hidden">Loading…</span>
      </div>
      <span id="tz-display" class="badge bg-secondary ms-2" style="font-size:.65rem;"></span>
    </div>
  </div>

  <!-- Battery controls + Optimize button (populated by JS after /api/config) -->
  <div class="w-100" id="battery-controls">
    <div id="battery-inputs" class="d-flex flex-wrap gap-1 align-items-end mt-2"></div>
  </div>
</nav>

<!-- ── Inverter info bar ────────────────────────────────────────────── -->
<div class="px-2 py-2 bg-light border-bottom d-flex flex-wrap align-items-center gap-1 overflow-x-auto">
  <span class="small text-muted fw-semibold me-1" style="white-space:nowrap;">Inverters:</span>
  <div id="inverter-info" class="d-flex flex-wrap gap-1"></div>
</div>

<!-- ── Tabs ─────────────────────────────────────────────────────────── -->
<div class="px-2 pt-1">
  <ul class="nav nav-tabs d-flex flex-nowrap overflow-x-auto pb-0" id="mainTabs"
    style="border-bottom:1px solid #dee2e6;"></ul>
  <div class="tab-content" id="tabContent"></div>
</div>

<script>
// ── Timezone ──────────────────────────────────────────────────────────────
const TZ = Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC';
document.getElementById('tz-display').textContent = '🕐 ' + TZ;

// ── State ─────────────────────────────────────────────────────────────────
let ALL_TABS = [];
let FIRST_INV_TAB = '';

// ── Tab switching ─────────────────────────────────────────────────────────
function showTab(tabId) {
  ALL_TABS.forEach(id => {
    const pane = document.getElementById(id);
    const link = document.getElementById(id + '-link');
    if (!pane || !link) return;
    const active = id === tabId;
    pane.className = 'tab-pane' + (active ? ' show active' : '');
    link.className = 'nav-link' + (active ? ' active' : '');
  });
  const chartDiv = document.getElementById('chart-' + tabId);
  if (chartDiv && chartDiv.data) Plotly.relayout(chartDiv, { autosize: true });
}

// ── Build UI from /api/config ─────────────────────────────────────────────
function buildUI(cfg) {
  buildBatteryControls(cfg.batteries, cfg);
  buildInverterInfo(cfg.inverters);
  buildTabs(cfg);
}

function buildBatteryControls(batteries, cfg) {
  const container = document.getElementById('battery-inputs');
  container.innerHTML = '';

  for (const bat of batteries) {
    const div = document.createElement('div');
    div.className = 'd-flex flex-column me-3';
    div.innerHTML = `
      <label class="form-label mb-1 small fw-semibold text-white-50">
        ${bat.device_id} SoC&nbsp;(%)
      </label>
      <div class="input-group input-group-sm" style="width:130px">
        <input type="number" class="form-control bat-soc-input"
          id="soc-${bat.device_id}" data-battery="${bat.device_id}"
          min="${bat.min_soc_percentage}" max="${bat.max_soc_percentage}"
          value="${bat.initial_soc_percentage}" step="1">
        <span class="input-group-text">%</span>
      </div>
      <span class="small text-white-50">
        ${bat.min_soc_percentage}–${bat.max_soc_percentage}% · ${bat.capacity_wh}&nbsp;Wh
      </span>`;
    container.appendChild(div);
  }

  // Optimize button
  const optDiv = document.createElement('div');
  optDiv.className = 'd-flex flex-column';
  optDiv.innerHTML = `
    <div class="small text-white-50 mb-1" style="font-size:.7rem;">
      Horizon: ${cfg.horizon_h.toFixed(0)} h · Δt: ${cfg.dt_min} min · ${cfg.objective}
    </div>
    <button class="btn btn-success btn-sm px-3 fw-semibold"
      id="btn-optimize" onclick="runOptimize()" style="font-size:.75rem;">
      ▶ Optimize
    </button>`;
  container.appendChild(optDiv);
}

function buildInverterInfo(inverters) {
  const container = document.getElementById('inverter-info');
  container.innerHTML = '';
  for (const inv of inverters) {
    const pvBadge = inv.has_pv
      ? '<span class="badge bg-warning text-dark me-1">PV</span>' : '';
    const batBadge = inv.battery_id
      ? `<span class="badge bg-info text-dark me-1">${inv.battery_id}</span>` : '';
    const zfiBadge = inv.zero_feed_in
      ? '<span class="badge bg-secondary me-1">ZFI</span>' : '';
    const card = document.createElement('div');
    card.className = 'me-3 small border rounded px-2 py-1 bg-white';
    card.innerHTML = `
      <div class="fw-semibold">${inv.device_id}</div>
      <div>${pvBadge}${batBadge}${zfiBadge}</div>
      <div class="text-muted" style="font-size:.75rem">
        Out ${inv.max_ac_output_power_w.toFixed(0)} W ·
        Chg ${inv.max_ac_charge_power_w.toFixed(0)} W
      </div>`;
    container.appendChild(card);
  }
}

function buildTabs(cfg) {
  const PRED_TABS = [
    { id: 'tab-elecprice', label: 'Electric Price', height: '450px' },
    { id: 'tab-feedin',    label: 'Feed-in Tariff', height: '450px' },
    { id: 'tab-load',      label: 'Load',           height: '450px' },
    { id: 'tab-pv',        label: 'PV Forecast',    height: '450px' },
  ];
  if (cfg.has_weather) {
    PRED_TABS.push({ id: 'tab-weather', label: 'Weather', height: '600px' });
  }
  const INV_TABS = cfg.inverters.map(inv => ({
    id: `tab-inv-${inv.device_id}`,
    label: `⚡ ${inv.device_id}`,
    height: '700px',
  }));
  const allTabs = [...PRED_TABS, ...INV_TABS];

  ALL_TABS = allTabs.map(t => t.id);
  FIRST_INV_TAB = INV_TABS.length ? INV_TABS[0].id : '';

  const navEl = document.getElementById('mainTabs');
  const contentEl = document.getElementById('tabContent');
  navEl.innerHTML = '';
  contentEl.innerHTML = '';

  allTabs.forEach((tab, i) => {
    const li = document.createElement('li');
    li.className = 'nav-item';
    li.innerHTML = `<a class="nav-link${i === 0 ? ' active' : ''}" id="${tab.id}-link"
      href="#" data-tab="${tab.id}">${tab.label}</a>`;
    navEl.appendChild(li);

    const div = document.createElement('div');
    div.className = 'tab-pane' + (i === 0 ? ' show active' : '');
    div.id = tab.id;
    div.innerHTML = `<div id="chart-${tab.id}" class="gp-chart"
      style="height:${tab.height}"></div>`;
    contentEl.appendChild(div);
  });

  document.querySelectorAll('.nav-link[data-tab]').forEach(link => {
    link.addEventListener('click', e => {
      e.preventDefault();
      showTab(link.dataset.tab);
    });
  });
}

// ── Render Plotly charts ──────────────────────────────────────────────────
function renderCharts(chartsObj) {
  for (const [tabId, figData] of Object.entries(chartsObj)) {
    const el = document.getElementById('chart-' + tabId);
    if (!el) continue;
    const layout = Object.assign({ autosize: true }, figData.layout || {});
    Plotly.react(el, figData.data || [], layout, { responsive: true, displayModeBar: true });
  }
}

// ── Two-phase optimize flow ───────────────────────────────────────────────
async function runOptimize() {
  const btn = document.getElementById('btn-optimize');
  const spinner = document.getElementById('spinner');
  const statusEl = document.getElementById('status-msg');

  btn.disabled = true;
  spinner.classList.remove('d-none');
  statusEl.textContent = 'Fetching…';

  // Collect battery SoC overrides from the UI inputs
  const soc = {};
  document.querySelectorAll('.bat-soc-input').forEach(inp => {
    soc[inp.dataset.battery] = parseFloat(inp.value);
  });

  try {
    // Phase 1: fetch prediction charts
    const fetchResp = await fetch('/api/predictions/fetch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ timezone: TZ }),
    });
    if (!fetchResp.ok) {
      const body = await fetchResp.json().catch(() => ({ detail: fetchResp.statusText }));
      throw new Error('Fetch failed: ' + (body.detail || fetchResp.statusText));
    }
    renderCharts((await fetchResp.json()).charts);
    statusEl.textContent = 'Forecasts loaded ✓ · Optimizing…';

    // Phase 2: run optimization
    const optResp = await fetch('/api/optimize', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ timezone: TZ, battery_soc: soc }),
    });
    if (!optResp.ok) {
      const body = await optResp.json().catch(() => ({ detail: optResp.statusText }));
      throw new Error('Optimization failed: ' + (body.detail || optResp.statusText));
    }
    const optData = await optResp.json();
    renderCharts(optData.charts);
    statusEl.textContent = optData.status || 'Done ✓';

    if (FIRST_INV_TAB) showTab(FIRST_INV_TAB);

  } catch (err) {
    statusEl.textContent = '✗ ' + err.message;
    console.error('Optimize error:', err);
  } finally {
    btn.disabled = false;
    spinner.classList.add('d-none');
  }
}

// ── Init: load config from server ────────────────────────────────────────
async function init() {
  const statusEl = document.getElementById('status-msg');
  statusEl.textContent = 'Loading config…';
  try {
    const resp = await fetch('/api/config');
    if (!resp.ok) throw new Error('Config fetch failed: ' + resp.statusText);
    buildUI(await resp.json());
    statusEl.textContent = 'Ready';
  } catch (err) {
    statusEl.textContent = '✗ ' + err.message;
    console.error('Init error:', err);
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
