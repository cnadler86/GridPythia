<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GridPythia Dashboard</title>
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    crossorigin="anonymous">
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js" charset="utf-8"></script>
  <style>
    body { font-size: .875rem; background: #f4f5f7; color: #2c3040; }

    /* ── Navbar ── */
    .gp-navbar {
      background: #1e2230;
      border-bottom: 1px solid #2e3340;
      padding: .5rem 1rem;
      display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
    }
    .gp-brand { font-weight: 700; font-size: 1.1rem; color: #f0c040; letter-spacing: .02em; }
    .gp-status-chip {
      font-size: .7rem; padding: .2rem .55rem; border-radius: 999px;
      background: #3a4050; color: #bbb;
      white-space: nowrap;
    }
    .gp-status-chip.ok   { background: #1a3a2a; color: #4caf82; }
    .gp-status-chip.warn { background: #3a2e1a; color: #f0a030; }
    .gp-status-chip.err  { background: #3a1a1a; color: #e05050; }
    #next-slot { font-size: .8rem; color: #bbb; white-space: nowrap; }
    #next-slot strong { color: #f0c040; }
    .ms-auto { margin-left: auto !important; }

    /* ── MQTT status dot ── */
    .mqtt-dot {
      width: 9px; height: 9px; border-radius: 50%; display: inline-block;
      vertical-align: middle; margin-right: .25rem;
      background: #555;
    }
    .mqtt-dot.on  { background: #2e7d52; }
    .mqtt-dot.off { background: #c03030; }
    #mqtt-status { font-size: .7rem; color: #bbb; white-space: nowrap; }

    /* ── Backend status dot ── */
    .backend-dot {
      width: 8px; height: 8px; border-radius: 50%; display: inline-block;
      vertical-align: middle; margin-right: .25rem;
      background: #6a6f7e;
      opacity: .9;
    }
    .backend-dot.on { background: #2e7d52; }
    .backend-dot.off { background: #c03030; }
    #backend-status { font-size: .7rem; color: #b8bdca; white-space: nowrap; }

    /* ── Inverter cards ── */
    #inverter-row {
      display: flex; flex-wrap: wrap; gap: .75rem;
      padding: .75rem 1rem;
      background: #fff;
      border-bottom: 1px solid #dde1e8;
    }
    .inv-card {
      background: #f9fafc;
      border: 1px solid #dde1e8;
      border-radius: .5rem;
      padding: .6rem .9rem;
      min-width: 200px;
      position: relative;
    }
    .inv-card.fresh { border-color: #2a7a4a; background: #f0faf4; }
    .inv-card.stale { border-color: #c07020; background: #fdf7ed; }
    .inv-card.unknown { border-color: #aab0be; }
    .inv-card-title {
      display: flex; align-items: center; justify-content: space-between;
      font-weight: 600; font-size: .8rem; color: #2c3040; margin-bottom: .3rem;
    }
    .soc-bar-bg {
      height: 8px; background: #e0e3ea; border-radius: 4px; margin: .3rem 0;
    }
    .soc-bar-fill {
      height: 8px; border-radius: 4px;
      background: linear-gradient(to right, #2196f3, #2e7d52);
      transition: width .5s ease;
    }
    .soc-bar-fill.low { background: linear-gradient(to right, #e05050, #f0a030); }
    .inv-meta { font-size: .7rem; color: #666; display: flex; gap: .5rem; flex-wrap: wrap; }
    .freshness-dot {
      width: 8px; height: 8px; border-radius: 50%; display: inline-block;
      margin-right: .3rem; vertical-align: middle;
    }
    .freshness-dot.ok   { background: #2e7d52; }
    .freshness-dot.warn { background: #e08020; }
    .freshness-dot.err  { background: #c03030; }

    /* ── Mode badge (top-right of inv-card) ── */
    .mode-badge {
      margin-left: .7rem;
      font-size: .68rem; font-weight: 700; color: #888;
      letter-spacing: .03em; line-height: 1;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: flex-end;
      min-width: 1.7em;
    }

    /* ── Status bar ── */
    #status-bar {
      display: flex; align-items: center; gap: .75rem; flex-wrap: wrap;
      padding: .4rem 1rem;
      background: #fff;
      border-bottom: 1px solid #dde1e8;
      font-size: .75rem; color: #555;
    }
    #status-bar .sep { color: #ccc; }
    #last-opt-info { color: #444; }
    .btn-gp {
      font-size: .72rem; padding: .2rem .65rem;
      border-radius: .35rem; border: 1px solid #bcc0cc;
      background: #f0f2f5; color: #333; cursor: pointer;
    }
    .btn-gp:hover { background: #e4e7ef; color: #111; }
    .btn-gp:disabled { opacity: .45; cursor: default; }
    .btn-gp.primary { border-color: #2a7a4a; background: #ebf7f0; color: #2a7a4a; }
    .btn-gp.primary:hover { background: #d4efdf; color: #1a5a34; }

    /* ── Tabs ── */
    #tabs-nav {
      background: #fff;
      padding: .4rem 1rem 0;
      border-bottom: 1px solid #dde1e8;
      display: flex; gap: .15rem; overflow-x: auto;
    }
    .tab-btn {
      font-size: .75rem; padding: .3rem .7rem; border: none;
      background: transparent; color: #666; cursor: pointer;
      border-bottom: 2px solid transparent; white-space: nowrap;
    }
    .tab-btn:hover { color: #333; }
    .tab-btn.active { color: #1565c0; border-bottom-color: #1565c0; }
    .tab-pane { display: none; padding: .5rem 1rem; }
    .tab-pane.active { display: block; }
    .gp-chart { min-height: 350px; }
    .chart-placeholder {
      height: 350px; display: flex; align-items: center; justify-content: center;
      color: #aaa; font-size: .85rem; background: #f9fafc;
      border-radius: .5rem; border: 1px dashed #ccc;
    }
    .spinner-sm {
      width: 14px; height: 14px; border: 2px solid #bbb;
      border-top-color: #f0c040; border-radius: 50%;
      animation: spin .7s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ── Navbar ──────────────────────────────────────────────────────────── -->
<header class="gp-navbar">
  <span class="gp-brand">⚡ GridPythia</span>
  <span id="chip-pred" class="gp-status-chip">Predictions: —</span>
  <span id="chip-opt"  class="gp-status-chip">Optimization: —</span>
  <span id="next-slot" class="ms-auto">Next opt: <strong id="countdown">—</strong></span>
  <span id="server-clock" style="font-size:.75rem;color:#bbb;white-space:nowrap">—</span>
  <span id="backend-status"><span class="backend-dot" id="backend-dot"></span>Backend</span>
  <span id="mqtt-status"><span class="mqtt-dot" id="mqtt-dot"></span>MQTT</span>
  <span id="spinner-global" class="spinner-sm" style="display:none"></span>
</header>

<!-- ── Inverter cards ────────────────────────────────────────────────── -->
<div id="inverter-row">
  <span class="text-muted" style="font-size:.75rem;align-self:center">Loading…</span>
</div>

<!-- ── Action bar ────────────────────────────────────────────────────── -->
<div id="status-bar">
  <span id="last-opt-info">No optimization yet</span>
  <span class="sep">|</span>
  <button class="btn-gp"         id="btn-refresh"  onclick="triggerFetch()">↻ Refresh predictions</button>
  <button class="btn-gp primary" id="btn-optimize" onclick="triggerOptimize()" disabled>▶ Optimize now</button>
  <span id="action-status" style="color:#aaa;font-size:.7rem;"></span>
</div>

<!-- ── Chart tabs ────────────────────────────────────────────────────── -->
<div id="tabs-nav"></div>
<div id="tabs-content"></div>

<script>
'use strict';

// ── Globals ────────────────────────────────────────────────────────────────
let TZ = 'UTC';           // server timezone – updated from /api/config
let CFG = null;           // AppConfigResponse
let TABS = [];            // [{id, label}]
let LAST_OPT = null;      // last optimize response
let CHART_DATA = {};      // tabId → plotly data
let BUSY = false;
let WS = null;
let WS_RETRY_MS = 1000;
let BACKEND_POLL_TIMER = null;

// ── Scheduler timing (server-pushed) ──────────────────────────────────────
let SCHEDULER_RUN_AT_MS = null;   // Date.getTime() of next scheduler run

// ── Inverter cache (WS-fed, client-side age tracking) ─────────────────────
// device_id → { soc, mode, mode_name, age_s, reported_at, is_fresh, _received_at_ms }
const INVERTER_CACHE = {};

// ── Utility ────────────────────────────────────────────────────────────────
function fmtAge(s) {
  if (s == null) return '—';
  if (s < 60)   return Math.round(s) + 's ago';
  if (s < 3600) return Math.round(s / 60) + 'min ago';
  return Math.round(s / 3600) + 'h ago';
}

function fmtTimestamp(isoStr) {
  if (!isoStr) return '—';
  try {
    return new Date(isoStr).toLocaleString('de-DE', {
      timeZone: TZ,
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit',
    });
  } catch (e) {
    return isoStr;
  }
}

function setSpinner(on) {
  document.getElementById('spinner-global').style.display = on ? 'inline-block' : 'none';
}

function setActionStatus(msg, color) {
  const el = document.getElementById('action-status');
  el.textContent = msg;
  el.style.color = color || '#888';
}

// ── 1-second tick: clock + countdown + inverter freshness ─────────────────
function tick() {
  // Server clock
  const el = document.getElementById('server-clock');
  if (el) {
    try {
      el.textContent = new Date().toLocaleString('de-DE', {
        timeZone: TZ, hour: '2-digit', minute: '2-digit', second: '2-digit',
      }) + ' (' + TZ + ')';
    } catch (e) {
      el.textContent = new Date().toLocaleTimeString();
    }
  }

  // Countdown to next scheduled optimizer run (server-pushed run_at)
  const cd = document.getElementById('countdown');
  if (cd) {
    if (SCHEDULER_RUN_AT_MS !== null) {
      const remaining_s = Math.max(0, Math.round((SCHEDULER_RUN_AT_MS - Date.now()) / 1000));
      const m = Math.floor(remaining_s / 60);
      const s = String(remaining_s % 60).padStart(2, '0');
      cd.textContent = m + ':' + s;
    } else {
      cd.textContent = '—';
    }
  }

  // Inverter freshness (recompute age from original age_s + elapsed since received)
  if (CFG) refreshInverterUI();
}

// ── Inverter cards ─────────────────────────────────────────────────────────
function buildInverterCards(cfgInverters) {
  const row = document.getElementById('inverter-row');
  row.innerHTML = '';
  for (const inv of cfgInverters) {
    const card = document.createElement('div');
    card.className = 'inv-card unknown';
    card.id = 'inv-card-' + inv.device_id;
    card.innerHTML = `
      <div class="inv-card-title">
        <span>
          <span class="freshness-dot" id="dot-${inv.device_id}" title="no data"></span>
          ${inv.device_id}
          ${inv.has_pv ? '<span style="color:#f0a030;font-size:.65rem;margin-left:.3em">▲PV</span>' : ''}
        </span>
        <span class="mode-badge" id="mode-${inv.device_id}" title="Idle">I</span>
      </div>
      <div class="soc-bar-bg" id="soc-bar-bg-${inv.device_id}" title="— %">
        <div class="soc-bar-fill" id="soc-bar-${inv.device_id}" style="width:0%"></div>
      </div>`;
    row.appendChild(card);
  }
}

const _MODE_BADGE = {
  0: { text: 'I',   color: '#888',    title: 'Idle' },
  1: { text: '↓D',  color: '#e08020', title: 'Discharge' },
  2: { text: '↓D',  color: '#e08020', title: 'Discharge ZFI' },
  3: { text: '↑C',  color: '#1565c0', title: 'Charge' },
  4: { text: '↑C',  color: '#1565c0', title: 'Charge ZFI' },
};

function refreshInverterUI() {
  if (!CFG) return;
  const maxAgeSec = CFG.inverter_status_max_age_s;
  const now = Date.now();
  let allFresh = true;

  for (const inv of CFG.inverters) {
    const raw = INVERTER_CACHE[inv.device_id];
    const card = document.getElementById('inv-card-' + inv.device_id);
    const dot  = document.getElementById('dot-'  + inv.device_id);
    if (!card) continue;

    if (!raw) {
      card.className = 'inv-card unknown';
      dot.className  = 'freshness-dot';
      dot.title      = 'no data';
      document.getElementById('soc-bar-' + inv.device_id).style.width = '0%';
      document.getElementById('soc-bar-bg-' + inv.device_id).title = '— %';
      const badge0 = document.getElementById('mode-' + inv.device_id);
      badge0.textContent = 'I'; badge0.style.color = '#888'; badge0.title = 'Idle';
      allFresh = false;
      continue;
    }

    // age_s grows from its server-reported value as time passes
    const age_s = raw.age_s + (now - raw._received_at_ms) / 1000;
    const is_fresh = age_s < maxAgeSec;

    const pct = raw.soc.toFixed(1);
    const bar = document.getElementById('soc-bar-' + inv.device_id);
    bar.style.width = pct + '%';
    bar.className = 'soc-bar-fill' + (raw.soc < 25 ? ' low' : '');
    document.getElementById('soc-bar-bg-' + inv.device_id).title = pct + ' %';

    dot.title = fmtAge(age_s);

    const mInfo = _MODE_BADGE[raw.mode] || { text: '?', color: '#888', title: '?' };
    const badge = document.getElementById('mode-' + inv.device_id);
    badge.textContent = mInfo.text; badge.style.color = mInfo.color; badge.title = mInfo.title;

    if (is_fresh) {
      card.className = 'inv-card fresh';
      dot.className  = 'freshness-dot ok';
    } else if (age_s < maxAgeSec * 2) {
      card.className = 'inv-card stale';
      dot.className  = 'freshness-dot warn';
      allFresh = false;
    } else {
      card.className = 'inv-card unknown';
      dot.className  = 'freshness-dot err';
      allFresh = false;
    }
  }

  document.getElementById('btn-optimize').disabled = !allFresh || BUSY;
}

// ── Tab label map ──────────────────────────────────────────────────────────
const TAB_LABELS = {
  'tab-elecprice': 'Electric Price',
  'tab-feedin':    'Feed-in',
  'tab-load':      'Load',
  'tab-pv':        'PV Forecast',
  'tab-weather':   'Weather',
};

// ── Tabs ───────────────────────────────────────────────────────────────────
function buildTabs() {
  const predTabs = CFG.visible_prediction_tabs.map(id => ({ id, label: TAB_LABELS[id] ?? id }));
  const invTabs  = CFG.inverters.map(inv => ({
    id: 'tab-inv-' + inv.device_id, label: '⚡ ' + inv.device_id,
  }));
  TABS = [...predTabs, ...invTabs];

  const nav  = document.getElementById('tabs-nav');
  const body = document.getElementById('tabs-content');
  nav.innerHTML = ''; body.innerHTML = '';

  TABS.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.id = 'btn-tab-' + t.id;
    btn.textContent = t.label;
    btn.onclick = () => showTab(t.id);
    nav.appendChild(btn);

    const pane = document.createElement('div');
    pane.className = 'tab-pane' + (i === 0 ? ' active' : '');
    pane.id = 'pane-' + t.id;
    pane.innerHTML = `<div class="chart-placeholder" id="chart-${t.id}">No data yet</div>`;
    body.appendChild(pane);
  });
}

function showTab(id) {
  TABS.forEach(t => {
    document.getElementById('btn-tab-' + t.id)?.classList.toggle('active', t.id === id);
    const p = document.getElementById('pane-' + t.id);
    if (p) p.className = 'tab-pane' + (t.id === id ? ' active' : '');
  });
  const el = document.getElementById('chart-' + id);
  if (!el) return;
  if (el._dirty && CHART_DATA[id]) {
    _renderChart(el, id, CHART_DATA[id]);
  } else if (el._plotly) {
    Plotly.Plots.resize(el);
  }
}

function _renderChart(el, tabId, fig) {
  const hasPlot = Boolean(el._plotly);
  if (!hasPlot) el.replaceChildren();
  el.classList.remove('chart-placeholder');
  const h = (fig.layout && fig.layout.height) ? fig.layout.height : 400;
  el.style.height = h + 'px';
  el.style.minHeight = h + 'px';
  const layout = Object.assign({}, fig.layout || {}, { autosize: true });
  const plotFn = hasPlot ? Plotly.react : Plotly.newPlot;
  plotFn(el, fig.data || [], layout, { responsive: true, displayModeBar: false });
  el._plotly = true;
  el._dirty  = false;
}

function renderCharts(charts) {
  for (const [tabId, fig] of Object.entries(charts)) {
    CHART_DATA[tabId] = fig;
    const el = document.getElementById('chart-' + tabId);
    if (!el) continue;
    const pane = document.getElementById('pane-' + tabId);
    if (pane && !pane.classList.contains('active')) {
      el._dirty = true;
      continue;
    }
    _renderChart(el, tabId, fig);
  }
}

// ── MQTT status ────────────────────────────────────────────────────────────
function applyMqttStatus(s) {
  const dot   = document.getElementById('mqtt-dot');
  const label = document.getElementById('mqtt-status');
  if (!s.enabled) {
    dot.className = 'mqtt-dot';
    label.title   = 'MQTT disabled';
  } else if (s.connected) {
    dot.className = 'mqtt-dot on';
    label.title   = 'MQTT connected';
  } else {
    dot.className = 'mqtt-dot off';
    label.title   = 'MQTT disconnected';
  }
}

function setBackendStatus(ok, tooltip) {
  const dot = document.getElementById('backend-dot');
  const label = document.getElementById('backend-status');
  if (!dot || !label) return;
  dot.className = ok ? 'backend-dot on' : 'backend-dot off';
  label.title = tooltip || (ok ? 'Backend reachable' : 'Backend unreachable');
}

async function pollBackendStatus() {
  try {
    const data = await apiFetch('/api/backend/status');
    if (data && data.healthy) {
      const ts = data.server_time ? fmtTimestamp(data.server_time) : null;
      setBackendStatus(true, ts ? ('Backend ok · ' + ts) : 'Backend reachable');
      return;
    }
    setBackendStatus(false, 'Backend returned unhealthy status');
  } catch (e) {
    setBackendStatus(false, 'Backend unreachable: ' + e.message);
  }
}

// ── WebSocket live updates ─────────────────────────────────────────────────
function wsUrl() {
  const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  return proto + '//' + window.location.host + '/api/ws';
}

function handleLiveEvent(msg) {
  if (!msg || !msg.type) return;

  switch (msg.type) {
    case 'predictions_updated':
      if (msg.payload?.charts) {
        renderCharts(msg.payload.charts);
        updatePredChip(true);
        setActionStatus('Live: predictions updated', '#4caf82');
      }
      break;

    case 'optimization_updated':
      if (msg.payload?.summary) {
        LAST_OPT = msg.payload;
        if (msg.payload.charts) renderCharts(msg.payload.charts);
        updateOptChip(LAST_OPT);
        setActionStatus('Live: optimization updated', '#4caf82');
      }
      break;

    case 'inverter_status': {
      const s = msg.payload;
      if (s?.device_id) {
        INVERTER_CACHE[s.device_id] = { ...s, _received_at_ms: Date.now() };
        refreshInverterUI();
      }
      break;
    }

    case 'inverter_status_all':
      if (Array.isArray(msg.payload)) {
        for (const s of msg.payload) {
          if (s?.device_id) INVERTER_CACHE[s.device_id] = { ...s, _received_at_ms: Date.now() };
        }
        refreshInverterUI();
      }
      break;

    case 'scheduler_status':
      if (msg.payload?.run_at) {
        SCHEDULER_RUN_AT_MS = new Date(msg.payload.run_at).getTime();
      }
      break;

    case 'mqtt_status':
      if (msg.payload) applyMqttStatus(msg.payload);
      break;
  }
}

function connectWebSocket() {
  if (WS && (WS.readyState === WebSocket.OPEN || WS.readyState === WebSocket.CONNECTING)) return;

  try {
    WS = new WebSocket(wsUrl());
  } catch (e) {
    setTimeout(connectWebSocket, WS_RETRY_MS);
    WS_RETRY_MS = Math.min(WS_RETRY_MS * 2, 30_000);
    return;
  }

  WS.onopen = () => {
    WS_RETRY_MS = 1000;
    setActionStatus('Live connection active', '#7a7a7a');
  };

  WS.onmessage = (ev) => {
    try {
      const msg = JSON.parse(ev.data);
      handleLiveEvent(msg);
    } catch (e) {
      console.warn('ws parse failed:', e.message);
    }
  };

  WS.onclose = () => {
    setTimeout(connectWebSocket, WS_RETRY_MS);
    WS_RETRY_MS = Math.min(WS_RETRY_MS * 2, 30_000);
  };

  WS.onerror = () => {
    // onclose handles reconnect
  };
}

// ── Prediction / opt status chips ──────────────────────────────────────────
function updatePredChip(ok) {
  const chip = document.getElementById('chip-pred');
  chip.className  = ok ? 'gp-status-chip ok' : 'gp-status-chip warn';
  chip.textContent = ok ? 'Predictions: ok' : 'Predictions: no cache';
}

function updateOptChip(opt) {
  const chip = document.getElementById('chip-opt');
  const info = document.getElementById('last-opt-info');
  if (!opt) {
    chip.className  = 'gp-status-chip';
    chip.textContent = 'Optimization: —';
    return;
  }
  const savings  = opt.summary.savings_eur;
  const statusOk = opt.summary.solver_status === 'optimal' || opt.summary.solver_status === 'optimal_inaccurate';
  chip.className  = 'gp-status-chip ' + (statusOk ? 'ok' : 'warn');
  chip.textContent = 'Opt: ' + opt.summary.solver_status + ' · ' + (savings >= 0 ? '+' : '') + savings.toFixed(3) + ' EUR';
  const solvedAt  = opt.summary.solved_at ? fmtTimestamp(opt.summary.solved_at) : '—';
  info.textContent = 'Last optimization: ' + solvedAt + ' · ' + opt.summary.objective + ' · savings ' + savings.toFixed(3) + ' EUR';
}

// ── API helper ─────────────────────────────────────────────────────────────
async function apiFetch(path, method, body) {
  const opts = { method: method || 'GET', headers: {} };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const r = await fetch(path, opts);
  if (r.status === 204) return null;
  if (!r.ok) {
    const err = await r.json().catch(() => ({ detail: r.statusText }));
    throw new Error(err.detail || r.statusText);
  }
  return r.json();
}

// ── Manual: fetch predictions ──────────────────────────────────────────────
async function triggerFetch() {
  if (BUSY) return;
  BUSY = true; setSpinner(true); setActionStatus('Fetching predictions…', '#aaa');
  document.getElementById('btn-refresh').disabled = true;
  try {
    const data = await apiFetch('/api/predictions/fetch', 'POST', { timezone: TZ });
    renderCharts(data.charts);
    updatePredChip(true);
    setActionStatus('Predictions updated ✓', '#4caf82');
  } catch (e) {
    setActionStatus('✗ ' + e.message, '#e05050');
  } finally {
    BUSY = false; setSpinner(false);
    document.getElementById('btn-refresh').disabled = false;
  }
}

// ── Manual: optimize now ───────────────────────────────────────────────────
async function triggerOptimize() {
  if (BUSY) return;
  BUSY = true; setSpinner(true); setActionStatus('Optimizing…', '#aaa');
  document.getElementById('btn-optimize').disabled = true;
  try {
    const data = await apiFetch('/api/optimize', 'POST', { timezone: TZ });
    LAST_OPT = data;
    renderCharts(data.charts);
    updateOptChip(data);
    setActionStatus(data.status || 'Optimization done ✓', '#4caf82');

    // Jump to first inverter tab
    const firstInv = TABS.find(t => t.id.startsWith('tab-inv-'));
    if (firstInv) showTab(firstInv.id);
  } catch (e) {
    setActionStatus('✗ ' + e.message, '#e05050');
  } finally {
    BUSY = false; setSpinner(false);
    refreshInverterUI();  // re-evaluate button state from INVERTER_CACHE
  }
}

// ── Main init ──────────────────────────────────────────────────────────────
async function init() {
  try {
    CFG = await apiFetch('/api/config');
    setBackendStatus(true, 'Backend reachable');
    TZ  = CFG.server_timezone || 'UTC';
    buildInverterCards(CFG.inverters);
    buildTabs();

    // Always fetch fresh predictions on page load so plots start from ~now
    try {
      setActionStatus('Fetching predictions…', '#aaa');
      const predData = await apiFetch('/api/predictions/fetch', 'POST', { timezone: TZ });
      renderCharts(predData.charts);
      updatePredChip(true);
      setActionStatus('Ready', '#7a7a7a');
    } catch (e) {
      setActionStatus('Prediction fetch failed: ' + e.message, '#f0a030');
      updatePredChip(false);
    }

    // Connect WebSocket – server hydrates optimization, inverters, MQTT and
    // scheduler status on connect (no extra HTTP round-trips needed).
    connectWebSocket();

    // Backend liveness indicator (subtle navbar dot).
    await pollBackendStatus();
    if (BACKEND_POLL_TIMER !== null) clearInterval(BACKEND_POLL_TIMER);
    BACKEND_POLL_TIMER = setInterval(pollBackendStatus, 10_000);

  } catch (e) {
    setBackendStatus(false, 'Init failed: ' + e.message);
    document.getElementById('inverter-row').innerHTML =
      '<span style="color:#e05050">Init failed: ' + e.message + '</span>';
    return;
  }

  // Single 1-second ticker handles clock, countdown and inverter freshness.
  setInterval(tick, 1_000);
  tick();
}

document.addEventListener('DOMContentLoaded', init);
</script>
